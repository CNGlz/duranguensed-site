<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duranguensed?</title>

<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: white;
    color: black;
    font-family: Arial, sans-serif;
  }

  #ui {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }

  h1 { margin: 0; font-size: 2rem; }

  button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    margin-top: 20px;
  }

  #videoWrap {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
  }

  #vid {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: white;
  }

  /* End buttons: hidden until video ends */
  #endButtons {
    display: none;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 24px;
    gap: 12px;
    justify-content: center;
    padding: 0 16px;
    box-sizing: border-box;
  }

  #endButtons button {
    margin-top: 0;
    width: min(320px, 46vw);
  }
</style>
</head>

<body>

<div id="ui">
  <h1>Wanna get duranguensed?</h1>
  <button id="go">Yes</button>
</div>

<div id="videoWrap">
  <video id="vid" playsinline controls preload="auto">
    <source src="vacaduranguense.mp4" type="video/mp4">
  </video>
</div>

<div id="endButtons">
  <button id="loopBtn">Get duranguensed again?</button>
  <button id="nextBtn">Get dogged next?</button>
</div>

<script>
  const btn = document.getElementById("go");
  const ui = document.getElementById("ui");
  const wrap = document.getElementById("videoWrap");
  const vid = document.getElementById("vid");
  const endButtons = document.getElementById("endButtons");
  const loopBtn = document.getElementById("loopBtn");
  const nextBtn = document.getElementById("nextBtn");

  const DOG_SITE_URL = "https://cnglz.github.io/dogged-site/";

  btn.addEventListener("click", () => {
    ui.style.display = "none";
    wrap.style.display = "block";
    endButtons.style.display = "none";
    vid.currentTime = 0;
    vid.play();
  });

  vid.addEventListener("ended", () => {
    endButtons.style.display = "flex";
  });

  loopBtn.addEventListener("click", () => {
    endButtons.style.display = "none";
    vid.currentTime = 0;
    vid.play();
  });

  nextBtn.addEventListener("click", () => {
    window.location.href = DOG_SITE_URL;
  });
</script>

</body>
</html>
