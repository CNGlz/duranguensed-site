<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duranguensed?</title>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: white;
  color: black;
  font-family: Arial, sans-serif;
}

#ui {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}

#videoWrap {
  display: none;
  position: fixed;
  inset: 0;
  background: white;
}

#vid {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: white;
}
</style>
</head>

<body>

<div id="ui">
  <h1>Wanna get duranguensed?</h1>
  <button id="go">Yes</button>
</div>

<div id="videoWrap">
  <video id="vid" playsinline controls preload="auto">
    <source src="vacaduranguense.mp4" type="video/mp4">
  </video>
</div>

<script>
const btn = document.getElementById("go");
const ui = document.getElementById("ui");
const wrap = document.getElementById("videoWrap");
const vid = document.getElementById("vid");

btn.addEventListener("click", () => {
  ui.style.display = "none";
  wrap.style.display = "block";

  vid.currentTime = 0;

  // Play with sound (no muted attribute)
  vid.play();
});
</script>

</body>
</html>
