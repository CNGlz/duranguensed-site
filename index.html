<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duranguensed?</title>

<style>
body {
    margin: 0;
    background: white;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Button styling */
button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

/* Video styling */
video {
    display: none;
    width: 100vw;
    height: 100vh;
    object-fit: contain;   /* prevents cropping */
    background: white;     /* matches page background */
}
</style>
</head>

<body>

<h1>Wanna get duranguensed?</h1>
<button onclick="playVideo()">Yes</button>

<video id="duranguenseVid" playsinline>
    <source src="vacaduranguense.mp4" type="video/mp4">
</video>

<script>
function playVideo() {
    document.querySelector("h1").style.display = "none";
    document.querySelector("button").style.display = "none";

    const video = document.getElementById("duranguenseVid");
    video.style.display = "block";
    video.currentTime = 0;
    video.play();
}
</script>

</body>
</html>
