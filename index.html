<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duranguensed?</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: white;
      color: black;
      font-family: Arial, sans-serif;
    }

    #ui {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      margin-top: 18px;
    }

    #videoWrap {
      display: none;
      position: fixed;
      inset: 0;
      background: white;
    }

    /* Default: show full video, no crop */
    #vid {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
    }

    /* Desktop-only: make it look bigger without cropping */
    @media (min-width: 900px) {
      #vid {
        transform: scale(1.25);      /* increase if you want bigger */
        transform-origin: center;
      }
    }
  </style>
</head>

<body>
  <div id="ui">
    <h1>Wanna get duranguensed?</h1>
    <button onclick="playVideo()">Yes</button>
  </div>

  <div id="videoWrap">
    <video id="vid" playsinline controls>
      <source src="vacaduranguense.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    function playVideo() {
      document.getElementById("ui").style.display = "none";
      document.getElementById("videoWrap").style.display = "block";

      const v = document.getElementById("vid");
      v.currentTime = 0;
      v.play();
    }
  </script>
</body>
</html>
