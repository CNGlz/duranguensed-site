<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duranguensed?</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: white;
      color: black;
      font-family: Arial, sans-serif;
    }

    #ui {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 { margin: 0; font-size: 2rem; }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      margin-top: 18px;
    }

    #videoWrap {
      display: none;
      position: fixed;
      inset: 0;
      background: white; /* match */
    }

    #vid {
      width: 100%;
      height: 100%;
      object-fit: contain; /* no crop */
      object-position: center;
      background: white;
    }

    /* Small overlay controls */
    #overlay {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      gap: 10px;
      align-items: center;
      justify-content: flex-start;
      pointer-events: none;
    }

    #overlay button {
      pointer-events: auto;
      margin: 0;
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 10px;
      background: black;
      color: white;
    }

    #status {
      pointer-events: auto;
      background: rgba(255,255,255,0.9);
      color: #000;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 100%;
    }
  </style>
</head>

<body>
  <div id="ui">
    <h1>Wanna get duranguensed?</h1>
    <button id="go">Yes</button>
  </div>

  <div id="videoWrap">
    <video id="vid" playsinline muted preload="auto" controls>
      <source src="vacaduranguense.mp4" type="video/mp4" />
    </video>
  </div>

  <div id="overlay">
    <button id="unmute">Unmute</button>
    <div id="status"></div>
  </div>

  <script>
    const ui = document.getElementById("ui");
    const wrap = document.getElementById("videoWrap");
    const vid = document.getElementById("vid");
    const overlay = document.getElementById("overlay");
    const statusBox = document.getElementById("status");
    const btn = document.getElementById("go");
    const unmuteBtn = document.getElementById("unmute");

    function setStatus(text) {
      statusBox.textContent = text || "";
      overlay.style.display = "flex";
      statusBox.style.display = text ? "block" : "none";
    }

    btn.addEventListener("click", async () => {
      ui.style.display = "none";
      wrap.style.display = "block";
      overlay.style.display = "flex";

      // Start muted to satisfy autoplay policies
      vid.muted = true;
      vid.currentTime = 0;

      try {
        await vid.play();
        setStatus("Playing (muted). Tap Unmute if you want sound.");
      } catch (e) {
        // If still blocked, user can press play in controls
        setStatus("If it didn’t start, press ▶ on the video controls.");
      }
    });

    unmuteBtn.addEventListener("click", () => {
      vid.muted = false;
      setStatus(""); // hide message, keep button visible
    });

    // If the file can't load, show a clear message
    vid.addEventListener("error", () => {
      setStatus("Video failed to load. Confirm the file name is exactly: vacaduranguense.mp4");
    });
  </script>
</body>
</html>
